<!DOCTYPE html><html><head><meta charset="utf-8">
<link id="nf" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head><body>
<p style="font-family:Nunito;font-weight:400">a</p><p style="font-family:Nunito;font-weight:500">a</p>
<p style="font-family:Nunito;font-weight:600">a</p><p style="font-family:Nunito;font-weight:700">a</p>
<p style="font-family:Nunito;font-weight:800">a</p>
<script>
window.__getFaces = function(){
  const out=[];
  for(const sheet of document.styleSheets){
    let rules; try{ rules=sheet.cssRules; }catch(e){ continue; }
    if(!rules) continue;
    for(const r of rules){
      if(r.type===5 || /font-face/i.test(r.cssText)){
        out.push(r.cssText);
      }
    }
  }
  return out;
};
</script>
</body></html>
